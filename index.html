<!DOCTYPE html>
<html>
  <head>
    <title>Movie Landing Page</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="movie-card">
      <div class="m-3">
        <h3 id="greeting"></h3>
        <h6 id="greeting-subtitle"></h6>
      </div>
      <div class="movie-header text-center">
        <h1 id="title">Loading...</h1>
        <p id="yearGenre" class="mb-0"></p>
      </div>
      <div class="row">
        <div class="col-md-4 text-center p-3">
          <img id="poster" src="" alt="Movie Poster" class="poster" />
        </div>
        <div class="col-md-8 p-4">
          <div>
            <div class="section-title">Plot</div>
            <p id="plot"></p>
          </div>
          <div class="section-title d-flex justify-content-between align-items-center">
            Details
            <button id="toggleDetails" class="btn btn-sm btn-outline-none">Hide ▲</button>
          </div>
          <div id="movieDetails">
            <ul class="list-unstyled details-list">
              <li><strong>Director:</strong> <span id="director"></span></li>
              <li>
                <strong>Actors:</strong>
                <span id="actors"></span>
              </li>
              <li><strong>Runtime:</strong> <span id="runtime"></span></li>
              <li><strong>Language:</strong> <span id="language"></span></li>
            </ul>
          </div>
          <div>
            <div class="section-title">Ratings</div>
            <div class="rating">
              <strong>IMDB:</strong>
              <span id="imdbStars"></span>
              <span id="imdbRating"></span>
            </div>
            <div class="rating">
              <strong>Rotten Tomatoes:</strong>
              <span id="rtStars"></span>
              <span id="rtRating"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
